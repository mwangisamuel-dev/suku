name: suku
description: Suku - Your pocket accountant. SME bookkeeping for Africa.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  supabase_flutter: ^2.3.0
  shared_preferences: ^2.2.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.0
  image_picker: ^1.0.7
  http: ^1.2.0
  google_mlkit_text_recognition: ^0.13.0
  telephony: ^0.2.0
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  path: ^1.8.3
  share_plus: ^9.0.0

  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false
  adaptive_icon_background: "#102A43"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
